<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Estadísticas Gallardas - Club de Baloncesto">
  <meta name="theme-color" content="#FF6B2C">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Estadísticas Gallardas</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="login-bg">

  <div class="login-card">
    <!-- Logo -->
    <div class="login-logo">
      <span class="logo-icon">🏀</span>
      <h1 class="logo-title">Estadísticas<br>Gallardas</h1>
      <p class="logo-subtitle">Club de Baloncesto</p>
    </div>

    <!-- Form -->
    <div class="form-group">
      <label class="form-label" for="loginEmail">Correo electrónico</label>
      <input class="form-input" type="email" id="loginEmail"
             placeholder="tu@correo.com" autocomplete="email">
    </div>

    <div class="form-group">
      <label class="form-label" for="loginPassword">Contraseña</label>
      <input class="form-input" type="password" id="loginPassword"
             placeholder="••••••••" autocomplete="current-password">
    </div>

    <div class="login-error" id="loginError"></div>

    <button class="btn-primary" id="loginBtn" onclick="doLogin()">
      Entrar a la app
    </button>

    <div style="text-align:center; margin-top:20px;">
      <button onclick="handleResetPassword()"
        style="background:none;border:none;color:var(--text-3);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);">
        ¿Problemas para entrar? Contacta con el club
      </button>
    </div>

    <!-- Demo mode banner -->
    <div id="demoNotice" style="display:none; margin-top:20px; padding:12px 14px;
      background:rgba(255,184,0,0.08); border:1px solid rgba(255,184,0,0.3);
      border-radius:12px; text-align:center;">
      <p style="font-size:12px; color:#FFB800; font-weight:700;">⚠️ Modo demostración</p>
      <p style="font-size:11px; color:var(--text-2); margin-top:3px;">
        Firebase no configurado. Usa cualquier email/contraseña para entrar.
      </p>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
</body>
</html>
